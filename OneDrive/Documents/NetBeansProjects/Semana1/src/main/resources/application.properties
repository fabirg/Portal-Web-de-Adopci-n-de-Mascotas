spring.application.name=tienda

#para definir el puerto donde "escuchará" el sevidor
server.port=80

#para definir el fomarto de despliegue de fecha/hora del log en la consola
logging.pattern.dateformat=hh:mm

#para eliminar mensajes invasivos de Spring
spring.main.banner-mode=off

#en desarrollo el "cache" del servidor (false), en producción "true"
spring.thymeleaf.cache=false
